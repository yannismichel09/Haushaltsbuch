<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8">
	<title>Dashboard</title>
	<link rel="stylesheet" href="style/searchFDashboardTransactions.css">
	<link rel="stylesheet" href="style/transactions.css">
</head>
<body>
	<main>
		<section id="summary-section">
			<div id="summary-cards">
				<div>
					<h3>Income</h3>
					<p id="income-sum">0,00 €</p>
				</div>
				<div>
					<h3>Spending</h3>
					<p id="spending-sum">0,00 €</p>
				</div>
				<div>
					<h3>Net Balance</h3>
					<p id="balance-sum">0,00 €</p>
				</div>
			</div>
		</section>

		<section class="search-filter">
			<h2>Search and Filter</h2>
			<form action="#" method="get">
				<fieldset>
					<legend>Filter Options</legend>
					<div>
						<div>
							<label for="search-input">Search</label>
							<input type="text" id="search-input" name="search" placeholder="Search...">
						</div>
					</div>

					<details>
						<summary>Toggle Filters</summary>
						<div>
							<div>
								<div>
									<label for="filter-type">Type</label>
									<select id="filter-type" name="filterType">
										<option value="" selected>All</option>
										<option value="income">Income</option>
										<option value="spending">Spending</option>
									</select>
								</div>
								<div>
									<label for="filter-category">Category</label>
									<select id="filter-category" name="filterCategory">
										<option value="" selected>All</option>
									</select>
								</div>
								<div>
									<label for="filter-frequency">Frequency</label>
									<select id="filter-frequency" name="filterFrequency">
										<option value="" selected>All</option>
										<option value="once">Once</option>
										<option value="weekly">Weekly</option>
										<option value="monthly">Monthly</option>
										<option value="yearly">Yearly</option>
									</select>
								</div>
							</div>
							<div>
								<div>
									<label for="filter-date-from">Date from</label>
									<input type="date" id="filter-date-from" name="filterDateFrom">
								</div>
								<div>
									<label for="filter-date-to">Date to</label>
									<input type="date" id="filter-date-to" name="filterDateTo">
								</div>
							</div>
							<div>
								<div>
									<label for="filter-amount-from">Amount from (€)</label>
									<input type="number" id="filter-amount-from" name="filterAmountFrom" step="0.01" placeholder="0.00">
								</div>
								<div>
									<label for="filter-amount-to">Amount to (€)</label>
									<input type="number" id="filter-amount-to" name="filterAmountTo" step="0.01" placeholder="999.99">
								</div>
							</div>
						</div>
					</details>

					<button type="submit">OK</button>
					<button type="reset">Reset</button>
					<button type="button" id="dashboard-export-csv-btn">CSV Export</button>
				</fieldset>
			</form>
		</section>

		<section id="search-results-section" style="display: none; margin-top: 20px;">
            <h2>Filter Results</h2>
            <div id="filtered-transactions-list" class="transactions-container">
                </div>
            <hr>
        </section>

		<section>
			<h2>Monthly Trend</h2>
			<div>
				<canvas id="monthly-trend-chart" aria-label="Monthly trend for income and spending" role="img"></canvas>
			</div>
		</section>

		<section>
			<h2>Budget vs Actual</h2>
			<div id="budget-vs-actual-container">
				<p style="color: #999; text-align: center; padding: 20px;">Loading categories...</p>
			</div>
		</section>

		
	</main>

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<script src="js/global.js"></script>
	<script src="js/apiCsv.js"></script>
	<script src="js/apiCategories.js"></script>
	<script src="js/apiDashboard.js"></script>
	<script src="js/dashboard.js"></script>
</body>
</html>
