<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8">
	<title>Categories</title>
</head>
<body>

	<main>

		<!-- Neue Kategorie anlegen -->
		<section>
			<h2>Add Category</h2>
			<form id="add-category-form">
				<div>
					<label for="category-name">Category Name</label>
					<input type="text" id="category-name" name="categoryName">
				</div>

				<div>
					<label for="category-description">Description</label>
					<input type="text" id="category-description" name="categoryDescription">
				</div>

				<div>
					<label for="category-color">Color</label>
					<input type="color" id="category-color" name="categoryColor" value="#000000">
				</div>

				<div>
					<label for="category-limit">Budget Limit (€)</label>
					<input type="number" id="category-limit" name="categoryLimit" step="0.01">
				</div>

				<div>
					<button type="submit" id="add-category-btn">Add</button>
				</div>
			</form>
		</section>

		<!-- Kategorien suchen und filtern -->
		<section>
			<h2>Search and Filter</h2>
			<form method="get">
				<fieldset>
					<legend>Filter Options</legend>
					<div>
						<label for="search-input">Search</label>
						<input type="text" id="search-input" name="keyword">
					</div>

					<details>
						<summary>Toggle Filters</summary>
						<div>
							<div>
								<fieldset>
									<legend>Colors (current examples)</legend>

									<div>
										<input type="checkbox" id="filter-color-red" name="categoryColors" value="#FF0000">
										<label for="filter-color-red">Red (#FF0000)</label>
									</div>

									<div>
										<input type="checkbox" id="filter-color-green" name="categoryColors" value="#00AA00">
										<label for="filter-color-green">Green (#00AA00)</label>
									</div>

									<div>
										<input type="checkbox" id="filter-color-blue" name="categoryColors" value="#0066FF">
										<label for="filter-color-blue">Blue (#0066FF)</label>
									</div>

									<div>
										<input type="checkbox" id="filter-color-orange" name="categoryColors" value="#FF9900">
										<label for="filter-color-orange">Orange (#FF9900)</label>
									</div>
								</fieldset>
							</div>
							<div>
								<div>
									<label for="filter-amount-min">Amount min (€)</label>
									<input type="number" id="filter-amount-min" name="amountMin" step="0.01">
								</div>
								<div>
									<label for="filter-amount-max">Amount max (€)</label>
									<input type="number" id="filter-amount-max" name="amountMax" step="0.01">
								</div>
							</div>
						</div>
					</details>

					<button type="submit">OK</button>
					<button type="reset">Reset</button>
					<button type="button">CSV Export</button>
				</fieldset>
			</form>
		</section>

		<!-- Ergebnisliste der Kategorien -->
		<section>
			<div id="filtered-categories-list">
			</div>
		</section>

	</main>

</body>
</html>
