<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8">
	<title>Categories</title>
	<link rel="stylesheet" href="style/categories.css">
</head>
<body>

	<main>

		<!-- Neue Kategorie anlegen -->
		<section>
			<h2>Add Category</h2>
			<form id="add-category-form">
				<div class="field-full">
					<label for="category-name">Category Name</label>
					<input type="text" id="category-name" name="categoryName" placeholder="e.g. Groceries">
				</div>

				<div class="field-full">
					<label for="category-description">Description</label>
					<input type="text" id="category-description" name="categoryDescription" placeholder="Short description of the category">
				</div>

				<div class="color-limit-row">
					<div class="color-block">
						<label>Color</label>
						<input type="hidden" id="category-color" name="categoryColor" value="">
						<div class="color-picker" id="color-picker"></div>
					</div>

					<div class="limit-block">
						<label for="category-limit">Budget Limit (€)</label>
						<input type="number" id="category-limit" name="categoryLimit" step="0.01" placeholder="0.00">
					</div>
				</div>

				<div>
					<button type="reset" class="btn-action">Reset</button>
					<button type="button" id="add-category-btn" class="btn-action">Add</button>
				</div>
			</form>
		</section>

		<!-- Kategorien suchen und filtern -->
		<section>
			<h2>Search and Filter</h2>
			<form method="get">
				<fieldset>
					<legend>Filter Options</legend>
					<div>
						<label for="search-input">Search</label>
						<input type="text" id="search-input" name="keyword" placeholder="Search category...">
					</div>

					<details>
						<summary>Toggle Filters</summary>
						<div>
							<div>
								<fieldset>
									<legend>Colors</legend>
									<div class="filter-color-grid" id="filter-color-grid"></div>
								</fieldset>
							</div>
							<div>
								<div>
									<label for="filter-amount-min">Amount from (€)</label>
									<input type="number" id="filter-amount-min" name="amountMin" step="0.01" placeholder="0.00">
								</div>
								<div>
									<label for="filter-amount-max">Amount to (€)</label>
									<input type="number" id="filter-amount-max" name="amountMax" step="0.01" placeholder="999.99">
								</div>
							</div>
						</div>
					</details>

					<button type="submit">OK</button>
					<button type="reset">Reset</button>
					<button type="button">CSV Export</button>
				</fieldset>
			</form>
		</section>

		<!-- Ergebnisliste der Kategorien -->
		<section>
			<div id="filtered-categories-list">
			</div>
		</section>

	</main>

	<script src="js/global.js"></script>
	<script src="js/apiCategories.js"></script>
	<script src="js/categories.js"></script>

</body>
</html>
