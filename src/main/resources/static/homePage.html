<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Home Page</title>
    <link rel="stylesheet" href="style/tabs.css">
    <link rel="stylesheet" href="style/homePage.css">
</head>
<body>
  <div id="header">
      <div id="logo">
        Budget Book
        <div id="warning-container" class="hidden">
          <span id="warning-icon">!</span>
          <div id="warning-dropdown" class="warning-content">
              <ul id="warning-list"></ul>
          </div>
        </div>
      </div>
      <div id="headerText">
          <h2>Welcome to your digital Budget Book!</h2>
          <h2>Control your money. Understand your spending. Plan smarter.</h2>
      </div>
      <div id="userInfo">
        <span id="username"></span>
        <div class="user-menu-container">
            <img id="profilePicture" onclick="toggleDropdown()" />
            <div id="dropdownMenu" class="dropdown-content">
                <button onclick="logoutUser()">Logout</button>
            </div>
        </div>
    </div>
  </div> 

  <div class="tab">
    <button class="tablinks" onclick="openTab(event, 'dashboard')">Dashboard</button>
    <button class="tablinks" onclick="openTab(event, 'transactions')">Transactions</button>
    <button class="tablinks" onclick="openTab(event, 'categories')">Categories</button>
    <button class="tablinks" onclick="openTab(event, 'settings')">Settings</button>
  </div>
  
  <div id="dashboard" class="tabcontent">
    <iframe class="tab-frame" src="dashboard.html" title="Dashboard" style="width: 100%; border: 0;"></iframe>
  </div>
  <div id="transactions" class="tabcontent">
    <iframe class="tab-frame" src="transactions.html" title="Transactions" style="width: 100%; border: 0;"></iframe>
  </div>
  <div id="categories" class="tabcontent">
    <iframe class="tab-frame" src="categories.html" title="Categories" style="width: 100%; border: 0;"></iframe>
  </div>
  <div id="settings" class="tabcontent">
    <iframe class="tab-frame" src="settings.html" title="Settings" style="width: 100%; border: 0;"></iframe>
  </div>
  
  <script src="js/global.js"></script>
  <script src="js/homePage.js"></script>
  <script src="js/apiWarnings.js"></script>
  <script src="js/homePageWarnings.js"></script>
  <script src="js/tabs.js"></script>
  <script src="js/apiUser.js"></script>
  <script src="js/homePageIframes.js"></script>
</body>
</html>
