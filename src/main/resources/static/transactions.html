<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Transactions</title>
</head>
<body>

    <main class="container">

        <section class="new-transaction">
            <h2>Add Transaction</h2>
            <form id="add-transaction-form" class="transaction-form">
                
                <div class="form-group">
                    <input type="radio" id="income" name="transaction-type" value="income" checked>
                    <label for="income" class="btn-toggle">+ Income</label>
                      
                    <input type="radio" id="spending" name="transaction-type" value="spending">
                    <label for="spending" class="btn-toggle">- Spending</label>
                </div>

                <div class="form-group">
                    <label for="desc">Description</label>
                    <input type="text" id="desc" name="description" class="input-field" placeholder="Description">
                </div>

                <div class="form-group">
                    <label for="amount">Amount (€)</label>
                    <input type="number" id="amount" name="amount" class="input-field" step="0.01" placeholder="0.00">
                </div>

                <div class="form-group">
                    <label for="category-select">Category</label>
                    <select id="category-select" name="categoryId" class="select-field">
                        <option value="" disabled selected>Select...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" class="input-field">
                </div>

                <div class="form-group">
                    <label for="frequency">Frequency</label>
                    <select id="frequency" name="frequency" class="select-field">
                        <option value="once">Once</option>
                        <option value="weekly">Weekly</option>
                        <option value="monthly">Monthly</option>
                        <option value="yearly">Yearly</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="payed-by-select">Payed by</label>
                    <select id="payed-by-select" name="userId" class="select-field">
                        <option value="" disabled selected>Select...</option>
                    </select>
                </div>
                
                <div class="form-actions">
                    <button type="submit" id="save-btn" class="btn-action">Save</button>
                </div>
            </form>
        </section>

        <section class="search-filter">
            <h2>Search and Filter</h2>
            <div class="filter-controls">
                
                <div class="form-group">
                    <label for="search-input">Search</label>
                    <input type="text" id="search-input" name="search" class="input-field" placeholder="Search...">
                </div>

                <div class="form-group">
                    <label for="filter-type">Type</label>
                    <select id="filter-type" name="filterType" class="select-field">
                        <option value="" disabled selected>Select...</option>
                        <option value="income">Income</option>
                        <option value="spending">Spending</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="filter-category">Category</label>
                    <select id="filter-category" name="filterCategory" class="select-field">
                        <option value="" disabled selected>Select...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="filter-frequency">Frequency</label>
                    <select id="filter-frequency" name="filterFrequency" class="select-field">
                        <option value="" disabled selected>Select...</option>
                        <option value="once">Once</option>
                        <option value="weekly">Weekly</option>
                        <option value="monthly">Monthly</option>
                        <option value="yearly">Yearly</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="filter-date-from">Date from</label>
                    <input type="date" id="filter-date-from" name="filterDateFrom" class="input-field">
                </div>

                <div class="form-group">
                    <label for="filter-date-to">Date to</label>
                    <input type="date" id="filter-date-to" name="filterDateTo" class="input-field">
                </div>

                <div class="form-group">
                    <label for="filter-amount-from">Amount from (€)</label>
                    <input type="number" id="filter-amount-from" name="filterAmountFrom" class="input-field" step="0.01" placeholder="0.00">
                </div>

                <div class="form-group">
                    <label for="filter-amount-to">Amount to (€)</label>
                    <input type="number" id="filter-amount-to" name="filterAmountTo" class="input-field" step="0.01" placeholder="0.00">
                </div>

                <div class="action-buttons">
                    <button type="button" id="apply-filter" class="btn-action">OK</button>
                    <button type="button" id="reset-filter" class="btn-action">Reset</button>
                    <button type="button" id="csv-export" class="btn-action">CSV Export</button>
                </div>
            </div>
        </section>

        <section class="transaction-list-section">
            <div id="filtered-transactions-list" class="transactions-container">
            </div>
        </section>

    </main>

</body>
</html>
