<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Transactions</title>
    <link rel="stylesheet" href="style/searchFDashboardTransactions.css">
</head>
<body>

    <main class="container">

        <section class="new-transaction">
            <h2>Add Transaction</h2>
            <form id="add-transaction-form" class="transaction-form">
                
                <div class="form-group">
                    <input type="radio" id="income" name="transaction-type" value="income" checked>
                    <label for="income" class="btn-toggle">+ Income</label>
                      
                    <input type="radio" id="spending" name="transaction-type" value="spending">
                    <label for="spending" class="btn-toggle">- Spending</label>
                </div>

                <div class="form-group">
                    <label for="desc">Description</label>
                    <input type="text" id="desc" name="description" class="input-field" placeholder="Short description of the transaction">
                </div>

                <div class="form-group">
                    <label for="amount">Amount (€)</label>
                    <input type="number" id="amount" name="amount" class="input-field" step="0.01" placeholder="0.00">
                </div>

                <div class="form-group">
                    <label for="category-select">Category</label>
                    <select id="category-select" name="categoryId" class="select-field">
                        <option value="" disabled selected>Select...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" class="input-field">
                </div>

                <div class="form-group">
                    <label for="frequency">Frequency</label>
                    <select id="frequency" name="frequency" class="select-field">
                        <option value="" disabled selected>Select...</option>
                        <option value="once">Once</option>
                        <option value="weekly">Weekly</option>
                        <option value="monthly">Monthly</option>
                        <option value="yearly">Yearly</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="payed-by-select">Payed by</label>
                    <select id="payed-by-select" name="userId" class="select-field">
                        <option value="" disabled selected>Select...</option>
                    </select>
                </div>
                
                <div class="form-actions">
                    <button type="button" id="reset-transaction-btn" class="btn-action">Reset</button>
                    <button type="button" id="add-transaction-btn" class="btn-action">Add</button>
                </div>
            </form>
        </section>

        <section class="search-filter">
            <h2>Search and Filter</h2>
            <form action="#" method="get">
                <fieldset>
                    <legend>Filter Options</legend>
                    <div>
                        <div>
                            <label for="search-input">Search</label>
                            <input type="text" id="search-input" name="search" placeholder="Search transaction...">
                        </div>
                    </div>
        
                    <details>
                        <summary>Toggle Filters</summary>
                        <div>
                            <div>
                                <div>
                                    <label for="filter-type">Type</label>
                                    <select id="filter-type" name="filterType">
                                        <option value="" selected>All</option>
                                        <option value="income">Income</option>
                                        <option value="spending">Spending</option>
                                    </select>
                                </div>
                                <div>
                                    <label for="filter-category">Category</label>
                                    <select id="filter-category" name="filterCategory">
                                        <option value="" selected>All</option>
                                    </select>
                                </div>
                                <div>
                                    <label for="filter-frequency">Frequency</label>
                                    <select id="filter-frequency" name="filterFrequency">
                                        <option value="" selected>All</option>
                                        <option value="once">Once</option>
                                        <option value="weekly">Weekly</option>
                                        <option value="monthly">Monthly</option>
                                        <option value="yearly">Yearly</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <div>
                                    <label for="filter-date-from">Date from</label>
                                    <input type="date" id="filter-date-from" name="filterDateFrom">
                                </div>
                                <div>
                                    <label for="filter-date-to">Date to</label>
                                    <input type="date" id="filter-date-to" name="filterDateTo">
                                </div>
                            </div>
                            <div>
                                <div>
                                    <label for="filter-amount-from">Amount from (€)</label>
                                    <input type="number" id="filter-amount-from" name="filterAmountFrom" step="0.01" placeholder="0.00">
                                </div>
                                <div>
                                    <label for="filter-amount-to">Amount to (€)</label>
                                    <input type="number" id="filter-amount-to" name="filterAmountTo" step="0.01" placeholder="999.99">
                                </div>
                            </div>
                        </div>
                    </details>
        
                    <button type="submit">OK</button>
                    <button type="reset">Reset</button>
                    <button type="button">CSV Export</button>
                </fieldset>
            </form>
        </section>

        <section class="transaction-list-section">
            <div id="filtered-transactions-list" class="transactions-container">
            </div>
        </section>

    </main>

</body>
</html>
